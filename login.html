<!-- ✅ Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ✅ Popup Login -->

<div class="popup" id="loginPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closeLogin()"><i class="fa-solid fa-xmark"></i></button>
    <h3><i class="fa-solid fa-lock"></i> เข้าสู่ระบบ</h3>

    <div class="input-group">
      <i class="fa-solid fa-user icon"></i>
      <input id="username" placeholder="ชื่อผู้ใช้">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-key icon"></i>
      <input type="password" id="password" placeholder="รหัสผ่าน">
    </div>

    <div class="register-section">
      <p>
        ยังไม่มีบัญชี?
        <a class="register-link" onclick="openRegister()">
          <i class="fa-solid fa-user-plus"></i> ลงทะเบียน
        </a>
      </p>
    </div><button class="login-btn" onclick="login()">เข้าสู่ระบบ</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ✅ Popup Logout -->
<div class="popup" id="logoutPopup">
  <div class="popup-content logout">
    <button class="close-btn" onclick="closeLogout()">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <h3><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</h3>
    <p class="logout-msg">คุณแน่ใจหรือไม่ว่าต้องการออกจากระบบ?</p>

    <div class="logout-actions">
      <button class="cancel-btn" onclick="closeLogout()">❌ ยกเลิก</button>
      <button class="confirm-btn" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>
  </div>
</div>
<!-- ✅ Popup ลงทะเบียน -->
<div class="popup" id="registerPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closeRegister()">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <h3><i class="fa-solid fa-user-plus"></i> ลงทะเบียน</h3>

    <div class="input-group">
      <i class="fa-solid fa-id-card icon"></i>
      <input id="reg_name" placeholder="ชื่อ-นามสกุล">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-user icon"></i>
      <input id="reg_username" placeholder="ชื่อผู้ใช้ใหม่">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-key icon"></i>
      <input type="password" id="reg_password" placeholder="รหัสผ่าน">
    </div>

    <button class="login-btn" onclick="registerUser()">สมัครสมาชิก</button>
    <p id="registerMsg"></p>
  </div>
</div>
